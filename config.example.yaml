  #   env: OPENAI_API_KEY

mcp:
  enabled: false                   # set true + upstream_url for MCP testing
  # upstream_url: https://mcp.example.com
  # transport: streamable_http
  # auth:
  #   type: bearer
  #   env: MCP_TOKEN
  #
  # Or basic auth:
  #   type: basic
  #   username: agent
  #   password_env: MCP_PASSWORD
